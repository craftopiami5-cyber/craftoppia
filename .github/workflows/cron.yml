name: Send Quiz Cron Job

on:
  schedule:
    # Run every 3 hours
    - cron: '0 */3 * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  trigger_cron:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Daily Quiz Cron Endpoint
        run: |
          if [ -z "${{ secrets.APP_URL }}" ]; then
            echo "Error: APP_URL secret is not set in GitHub repository secrets."
            exit 1
          fi
          
          # Clean URL trailing slash if present
          CLEAN_URL=$(echo "${{ secrets.APP_URL }}" | sed 's/\/$//')
          
          echo "Triggering cron job at: $CLEAN_URL/api/cron/send_daily_quiz"
          
          # Send request with Cron Secret if it is configured
          if [ -n "${{ secrets.CRON_SECRET }}" ]; then
            curl -X POST "$CLEAN_URL/api/cron/send_daily_quiz" \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              -f || exit 1
          else
            curl -X POST "$CLEAN_URL/api/cron/send_daily_quiz" \
              -f || exit 1
          fi
